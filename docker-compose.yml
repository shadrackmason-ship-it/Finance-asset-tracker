version: "3.9"

services:

  # ── DATABASE ─────────────────────────────────────────────────────────────────
  database:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: masontrack_db
      POSTGRES_USER: masontrack
      POSTGRES_PASSWORD: Mt@Secure2025!
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U masontrack -d masontrack_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── BACKEND ──────────────────────────────────────────────────────────────────
  backend:
    build: .
    restart: always
    expose:
      - "8000"
    env_file:
      - .env.production
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application
               --bind 0.0.0.0:8000
               --workers 4
               --threads 2
               --worker-class gthread
               --timeout 30
               --keep-alive 5
               --max-requests 1000
               --max-requests-jitter 100
               --log-level info"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── FRONTEND ─────────────────────────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
