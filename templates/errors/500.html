<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Something went wrong — MasonTrack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
    .code{font-size:6rem;font-weight:800;background:linear-gradient(135deg,#f85149,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
    .title{font-size:1.4rem;font-weight:700;margin:16px 0 10px;}
    .sub{color:#8b949e;font-size:0.9rem;margin-bottom:28px;}
    .btn{display:inline-flex;align-items:center;gap:6px;background:#7c3aed;color:#fff;text-decoration:none;border-radius:8px;padding:10px 22px;font-weight:600;font-size:0.875rem;}
    .btn:hover{background:#6d28d9;}
  </style>
</head>
<body>
  <div>
    <div class="code">500</div>
    <div class="title">Something went wrong</div>
    <p class="sub">We're working on it. Please try again in a moment.</p>
    <a href="/" class="btn"><i class="bi bi-house"></i> Back to Home</a>
  </div>
</body>
</html>
