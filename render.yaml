services:
  - type: web
    name: masontrack
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --workers 2 --threads 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: masontrack-db
          property: connectionString
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_HOST_USER
        value: rakitamason@gmail.com
      - key: EMAIL_HOST_PASSWORD
        value: hpeymnterqvwqkxg
      - key: DEFAULT_FROM_EMAIL
        value: MasonTrack <rakitamason@gmail.com>
      - key: OWNER_EMAIL
        value: rakitamason@gmail.com
      - key: ADMIN_URL
        value: mt-admin-x9k2
      - key: PYTHON_VERSION
        value: 3.12.0

databases:
  - name: masontrack-db
    databaseName: masontrack_db
    user: masontrack
    plan: free
